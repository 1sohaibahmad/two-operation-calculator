<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Calculator</title>
    <link rel="stylesheet" href="./style/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Stack+Sans+Text:wght@200..700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <section id="simple-calculator-section">
      <div class="calculator-wrapper">
        <div class="calculator-card">
          <div class="card-header">
            <span class="badge">Simple Mode</span>
            <h1>Smart Calculator</h1>
            <p>Add values instantly with a polished and modern experience.</p>
          </div>

          <form class="form-wrapper">
            <div class="form-input">
              <label for="first-value">First Value</label>
              <input type="text" name="first-value" id="first-value" placeholder="Enter first number" />
            </div>

            <div class="form-input">
              <label for="second-value">Second Value</label>
              <input type="text" name="second-value" id="second-value" placeholder="Enter second number" />
            </div>

            <div class="button-wrapper">
              <div class="form-input">
                <input type="button" value="Calculate Sum" id="sum-value" onclick="sum_value()" />
              </div>
              <div class="form-input">
                <input type="button" value="Clear" class="secondary-action" onclick="clear_values()" />
              </div>
            </div>

            <div class="result-box" id="sum-of-value" aria-live="polite">
              Your result will appear here.
            </div>
          </form>
        </div>

        <div class="double-implementation">
          <a href="./doule-cal.html">Try Advanced Mode</a>
        </div>
      </div>
    </section>
  </body>
  <script src="./function/script.js"></script>
</html>
